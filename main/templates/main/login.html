{% extends "main/layout.html" %}

{% block title %} Login {% endblock %}

{% block body %}

{% if msg %}
<p class="alert alert-danger">{{ msg }}</p>
{% endif %}

<div class="flex-grow flex items-center justify-center p-4">
    <div class="bg-dark-100 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
        <form action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label for="Username" class="block mb-2 text-sm font-medium">Username</label>
                <input type="text" id="username" name="username" required maxlength="30"
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your username">
            </div>
            <div class="mb-6">
                <label for="password" class="block mb-2 text-sm font-medium">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your password">
            </div>
            <input type="submit" value="Login"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition-colors">
        </form>
        <p class="mt-4 text-center text-sm">
            Don't have an account? <a href="{% url 'register' %}" class="text-blue-500 hover:underline">Register here</a>
        </p>
    </div>
</div>

{% endblock %}

{% block script %}
<script type="module" src="../../static/main/scripts/login.js"></script>
{% endblock %}
